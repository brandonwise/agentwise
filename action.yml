name: 'agentwise'
description: 'Security scanner for MCP server configurations'
author: 'Brandon Wise'

inputs:
  path:
    description: 'Path to scan (default: current directory)'
    required: false
    default: '.'
  fail-on:
    description: 'Fail if findings at this severity or above (critical, high, medium, low)'
    required: false
    default: ''
  format:
    description: 'Output format (terminal, json, sarif)'
    required: false
    default: 'terminal'
  version:
    description: 'agentwise version to use (default: latest)'
    required: false
    default: 'latest'

outputs:
  score:
    description: 'Security score (0-100)'
  grade:
    description: 'Security grade (A-F)'
  findings:
    description: 'Number of findings'

runs:
  using: 'composite'
  steps:
    - name: Install agentwise
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/brandonwise/agentwise/main/install.sh | sh

    - name: Run scan
      shell: bash
      run: |
        ARGS="scan ${{ inputs.path }}"
        if [ -n "${{ inputs.fail-on }}" ]; then
          ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"
        fi
        if [ "${{ inputs.format }}" != "terminal" ]; then
          ARGS="$ARGS --format ${{ inputs.format }}"
        fi
        agentwise $ARGS

branding:
  icon: 'shield'
  color: 'orange'
