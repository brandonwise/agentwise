name: 'agentwise'
description: 'Scan MCP server configurations for security vulnerabilities, misconfigurations, and known CVEs'
author: 'Brandon Wise'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to scan (file or directory)'
    required: false
    default: '.'
  format:
    description: 'Output format (terminal, json, sarif, html, markdown)'
    required: false
    default: 'terminal'
  fail-on:
    description: 'Fail if findings at this severity or above (critical, high, medium, low)'
    required: false
    default: ''
  output:
    description: 'Write report to file path'
    required: false
    default: ''
  live:
    description: 'Query OSV for live CVE data'
    required: false
    default: 'false'
  supply-chain:
    description: 'Run supply chain analysis'
    required: false
    default: 'false'
  version:
    description: 'agentwise version to install when install-mode=release'
    required: false
    default: 'latest'
  install-mode:
    description: 'Install from a GitHub release (release) or build the checked-out action source (source)'
    required: false
    default: 'release'

runs:
  using: 'composite'
  steps:
    - name: Install agentwise
      shell: bash
      env:
        INPUT_INSTALL_MODE: ${{ inputs.install-mode }}
        INPUT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/scripts/action-install.sh"

    - name: Run agentwise scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_LIVE: ${{ inputs.live }}
        INPUT_SUPPLY_CHAIN: ${{ inputs.supply-chain }}
      run: bash "$GITHUB_ACTION_PATH/scripts/action-scan.sh"
